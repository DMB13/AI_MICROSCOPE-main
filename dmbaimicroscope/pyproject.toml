[tool.briefcase]
project_name = "DMB AI Microscope"
bundle = "com.dmb.ai"
version = "1.0.0"
url = "https://github.com/DMB13/AI_Microscope-main.git"
license.file = "LICENSE"
author = "Devis Byaru"
author_email = "devisbyaru13@gmail.com"

[tool.briefcase.app.dmbaimicroscope]
formal_name = "DMB AI Microscope"
description = "AI-Powered Diagnostic Assistant For Clinical Bacterial Classfication"
long_description = """
An advanced diagnostic tool for bacterial identification 
using artificial intelligence and computer vision.
Developed for Mbeya Regional Referral Hospital.
"""
# This tells Briefcase to look in the src directory for your code
sources = ["src/dmbaimicroscope"]

# These are the Python packages downloaded from PyPI
requires = [
    "customtkinter",
    "tensorflow==2.16.1",
    "keras",
    "numpy",
    "pillow",
    "opencv-python",
]

[tool.briefcase.app.dmbaimicroscope.macOS]
universal_build = true
requires = []

[tool.briefcase.app.dmbaimicroscope.linux]
requires = []

[tool.briefcase.app.dmbaimicroscope.windows]
# Ensures the .exe is high-quality and includes necessary Windows support
requires = []
# Ensure logo.ico is in the root directory (AI_MICROSCOPE-main/logo.ico)
icon = "logo"

[tool.briefcase.app.dmbaimicroscope.windows.msi]
# This enables the generation of a professional Windows Installer
