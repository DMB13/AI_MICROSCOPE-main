[tool.briefcase.app.dmbaimicroscope]
formal_name = "DMB AI Microscope"
description = "AI-Powered Diagnostic Assistant For Clinical Bacterial Classification"
long_description = """
An advanced diagnostic tool for bacterial identification 
using artificial intelligence and computer vision.
Developed for Mbeya Regional Referral Hospital.
"""
sources = ["src/dmbaimicroscope"]
# We ensure the app includes the model and resource subfolders
include = ["model/*", "resources/*", "inference/*", "*.keras", "*.json", "*.png", "*.ico"]

requires = [
    "tensorflow==2.16.1",
    "opencv-python>=4.7.0",
    "Pillow>=9.5.0",
    "customtkinter>=5.2.2",
    "numpy<2.0.0",
    "matplotlib>=3.8.0",
    "reportlab>=3.6.0",
    "scikit-learn>=1.4.0"
]

[tool.briefcase.app.dmbaimicroscope.windows]
requires = []
icon = "src/dmbaimicroscope/resources/logo" # Update this path to your actual .ico location
