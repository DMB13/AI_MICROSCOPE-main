name: Build and Release Installer

on:
  push:
    tags:
      - 'v*' # Triggers when you push a tag like v1.0.0

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install briefcase briefcase-windows tensorflow opencv-python Pillow

      # Optional: Use Briefcase to bundle things if needed, 
      # but here we use Inno Setup directly on your source
      
      - name: Compile Installer (Inno Setup)
        uses: iotaledger/iscc-action@v1
        with:
          filepath: 'setup.iss' # Points to your .iss file

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: installers/DMB_AI_Microscope_Setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
