name: Legacy Compatible Build
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nuitka==0.6.19 zstandard ordered-set

      - name: Execute Legacy Nuitka Build
        # We removed --accept-downloads and --collect-all
        # We use --include-package which works in older versions
        run: python -m nuitka --standalone --enable-plugin=tk-inter --include-package=tensorflow --include-package=keras --include-package=customtkinter --include-data-dir=model=model --include-data-dir=inference=inference --include-data-dir=docs=docs --windows-icon-from-ico=logo.ico --output-filename="DMB-AI-MICROSCOPE" app/main_app.py

      - name: Compile Windows Installer
        run: iscc setup.iss

      - name: Publish Release
        uses: softprops/action-gh-release@v1
        with:
          files: Output/DMB_AI_Microscope_Setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
