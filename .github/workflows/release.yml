name: Briefcase Windows Release
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Briefcase
        run: |
          python -m pip install --upgrade pip
          pip install briefcase

      - name: Build Windows App
        # We move into the briefcase project folder first
        run: |
          cd dmbaimicroscope
          briefcase create windows --no-input
          briefcase build windows --no-input
          briefcase package windows --no-sign --no-input

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v1
        with:
          # Briefcase outputs the MSI in the 'windows' folder
          files: dmbaimicroscope/windows/*.msi
          name: DMB AI Microscope Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
