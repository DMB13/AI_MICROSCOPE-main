name: Build Zero-Dependency EXE
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Briefcase
        run: pip install briefcase

      - name: Briefcase Bundle (Packaging Python + AI)
        run: |
          python -m briefcase create windows --no-input
          python -m briefcase build windows --no-input
          python -m briefcase package windows --no-sign --no-input

      - name: Compile Inno Setup Installer
        run: |
          # Use the pre-installed ISCC compiler on the Windows runner
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" setup.iss
        shell: powershell

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: installers/DMB_AI_Microscope_v1.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
